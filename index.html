<!DOCTYPE html>
<html lang="zh-CN" class="light-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝辅食记录</title>
    <style>
        /* 全局变量：白天/夜间配色 */
        :root.light-mode {
            --bg-main: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-bg: #ffffff;
            --text-main: #444444;
            --text-secondary: #888888;
            --text-light: #999999;
            --primary: #ff8fab;
            --primary-light: #ffb3c6;
            --primary-gradient: linear-gradient(135deg, #ff8fab, #ff739e);
            --success-gradient: linear-gradient(135deg, #67c28e, #59b07d);
            --gray-gradient: linear-gradient(135deg, #909399, #7a7d82);
            --danger-gradient: linear-gradient(135deg, #ff6b6b, #ee5a52);
            --border: #eeeeee;
            --border-dashed: #f0f0f0;
            --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-card-hover: 0 12px 32px rgba(0, 0, 0, 0.1);
            --shadow-btn: 0 4px 12px rgba(255, 143, 171, 0.3);
            --shadow-btn-hover: 0 6px 20px rgba(255, 143, 171, 0.4);
            --shadow-item: 0 4px 16px rgba(0, 0, 0, 0.04);
            --shadow-item-hover: 0 6px 24px rgba(0, 0, 0, 0.08);
            --focus-shadow: 0 0 0 4px rgba(255, 143, 171, 0.1);
            --empty-text: #cccccc;
        }
        :root.dark-mode {
            --bg-main: linear-gradient(135deg, #1f2125 0%, #121417 100%);
            --card-bg: #27292d;
            --text-main: #f5f5f5;
            --text-secondary: #c0c4cc;
            --text-light: #909399;
            --primary: #ff9eb5;
            --primary-light: #ffc1d1;
            --primary-gradient: linear-gradient(135deg, #ff9eb5, #ff83a8);
            --success-gradient: linear-gradient(135deg, #72d392, #64c282);
            --gray-gradient: linear-gradient(135deg, #a8abb2, #909399);
            --danger-gradient: linear-gradient(135deg, #ff7a7a, #f56565);
            --border: #38393d;
            --border-dashed: #303134;
            --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.2);
            --shadow-card-hover: 0 12px 32px rgba(0, 0, 0, 0.3);
            --shadow-btn: 0 4px 12px rgba(255, 143, 171, 0.2);
            --shadow-btn-hover: 0 6px 20px rgba(255, 143, 171, 0.3);
            --shadow-item: 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-item-hover: 0 6px 24px rgba(0, 0, 0, 0.3);
            --focus-shadow: 0 0 0 4px rgba(255, 143, 171, 0.2);
            --empty-text: #444649;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            background: var(--bg-main);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        /* 模式切换按钮 */
        .mode-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow-item);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .mode-switch:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-item-hover);
        }

        /* 通用动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.15); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover);
        }

        /* 标题样式 */
        .title {
            text-align: center;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            margin-bottom: 8px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .list-title {
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 500;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background: transparent;
            color: var(--text-main);
        }
        input::placeholder, textarea::placeholder {
            color: var(--text-light);
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: var(--focus-shadow);
            transform: scale(1.02);
        }
        textarea {
            resize: none;
            min-height: 80px;
        }

        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: var(--shadow-btn);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-btn-hover);
            filter: brightness(1.05);
        }
        .filter-btn {
            padding: 12px 16px;
            background: var(--success-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(103, 194, 142, 0.2);
        }
        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(103, 194, 142, 0.3);
        }
        .reset-btn {
            padding: 12px 16px;
            background: var(--gray-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(144, 147, 153, 0.2);
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(144, 147, 153, 0.3);
        }
        .del-btn {
            padding: 6px 10px;
            background: var(--danger-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .del-btn:hover {
            transform: scale(1.05);
            animation: pulse 0.6s ease-in-out infinite;
        }

        /* 筛选栏 */
        .filter-box {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed var(--border-dashed);
        }
        .filter-box .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 统计和列表 */
        .stat {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 12px;
        }
        .record-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-item);
            animation: slideIn 0.4s ease-out;
            border: 1px solid var(--border);
        }
        .record-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-item-hover);
        }
        .record-date {
            font-size: 13px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 6px;
        }
        .record-content {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.8;
        }
        .record-btns {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .empty {
            text-align: center;
            color: var(--empty-text);
            padding: 40px 0;
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>

<body>
    <!-- 日夜模式切换按钮 -->
    <button class="mode-switch" id="modeSwitch">🌙</button>

    <div class="container">
        <!-- 记录表单卡片 -->
        <div class="card">
            <h2 class="title">🍼 宝宝辅食记录</h2>
            <p class="subtitle">轻松记录每一天的成长</p>

            <form id="foodForm">
                <div class="form-group">
                    <label>📅 日期</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label>⏰ 喂养时间</label>
                    <input type="time" id="time" required>
                </div>

                <div class="form-group">
                    <label>🥣 辅食内容</label>
                    <input type="text" id="food" placeholder="例：南瓜泥、高铁米粉、蛋黄羹" required>
                </div>

                <div class="form-group">
                    <label>🍽️ 喂养份量</label>
                    <input type="text" id="amount" placeholder="例：50g、半碗、1小袋" required>
                </div>

                <div class="form-group">
                    <label>😋 宝宝反馈</label>
                    <textarea id="feedback" placeholder="例：爱吃、不过敏、有点不喜欢"></textarea>
                </div>

                <button class="btn" type="submit">💾 保存记录</button>
            </form>

            <div class="stat" id="stat">共 0 条记录</div>
        </div>

        <!-- 日期筛选+记录列表 -->
        <div class="card">
            <h3 class="list-title">📖 辅食记录列表</h3>
            <div class="filter-box">
                <div class="form-group">
                    <label>筛选日期</label>
                    <input type="date" id="filterDate">
                </div>
                <button class="filter-btn" onclick="filterByDate()">🔍 筛选</button>
                <button class="reset-btn" onclick="renderAll()">♻️ 重置</button>
            </div>
            <div id="recordList"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'babyFoodRecords';
        const MODE_KEY = 'babyFoodRecordMode';
        const modeSwitch = document.getElementById('modeSwitch');
        const html = document.documentElement;

        // 页面加载：恢复保存的模式+渲染记录
        window.onload = function() {
            const savedMode = localStorage.getItem(MODE_KEY) || 'light-mode';
            setMode(savedMode);
            renderAll();
        };

        // 日夜模式切换逻辑
        modeSwitch.addEventListener('click', function() {
            const currentMode = html.className;
            const newMode = currentMode === 'light-mode' ? 'dark-mode' : 'light-mode';
            setMode(newMode);
            // 保存模式到本地
            localStorage.setItem(MODE_KEY, newMode);
        });

        // 设置模式样式+按钮图标
        function setMode(mode) {
            html.className = mode;
            modeSwitch.innerHTML = mode === 'light-mode' ? '🌙' : '☀️';
        }

        // 本地存储操作
        function getRecords() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        }
        function saveRecords(records) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        // 渲染所有记录
        function renderAll() {
            const records = getRecords();
            render(records);
        }

        // 按日期筛选
        function filterByDate() {
            const filterVal = document.getElementById('filterDate').value;
            if (!filterVal) {
                alert('请选择要筛选的日期！');
                return;
            }
            const allRecords = getRecords();
            const filterRecords = allRecords.filter(item => item.date === filterVal);
            render(filterRecords);
        }

        // 核心渲染：带动画延迟，每条记录依次入场
        function render(records) {
            const list = document.getElementById('recordList');
            const total = getRecords().length;
            animateStat(total);

            if (records.length === 0) {
                list.innerHTML = '<div class="empty">暂无辅食记录</div>';
                return;
            }

            list.innerHTML = records.map((item, index) => `
                <div class="record-item" style="animation-delay: ${index * 0.1}s">
                    <div class="record-date">${item.date} ${item.time}</div>
                    <div class="record-content">
                        <strong>🥣 辅食：</strong>${item.food}<br>
                        <strong>🍽️ 份量：</strong>${item.amount}<br>
                        <strong>😋 反馈：</strong>${item.feedback || '无'}
                    </div>
                    <div class="record-btns">
                        <button class="del-btn" onclick="del(${index})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 统计数字跳动动画
        function animateStat(target) {
            const el = document.getElementById('stat');
            const current = parseInt(el.innerText.match(/\d+/)[0] || 0);
            if (current === target) return;
            let start = current;
            const step = target > current ? 1 : -1;
            const timer = setInterval(() => {
                start += step;
                el.innerText = `共 ${start} 条记录`;
                if (start === target) clearInterval(timer);
            }, 50);
        }

        // 删除记录（带确认+保留筛选状态）
        function del(index) {
            if (confirm('确定要删除这条记录吗？删除后无法恢复！')) {
                const list = getRecords();
                list.splice(index, 1);
                saveRecords(list);
                const filterVal = document.getElementById('filterDate').value;
                filterVal ? filterByDate() : renderAll();
            }
        }

        // 保存新记录
        document.getElementById('foodForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const food = document.getElementById('food').value;
            const amount = document.getElementById('amount').value;
            const feedback = document.getElementById('feedback').value;

            const records = getRecords();
            records.unshift({ date, time, food, amount, feedback });
            saveRecords(records);

            this.reset();
            renderAll();
            document.getElementById('filterDate').value = '';
        });
    </script>
</body>
</html>
