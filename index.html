<!DOCTYPE html>
<html lang="zh-CN" class="light-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝辅食成长记录</title>
    <style>
        :root.light-mode {
            --bg-main: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-bg: #ffffff;
            --text-main: #444444;
            --text-secondary: #888888;
            --text-light: #999999;
            --primary: #ff8fab;
            --primary-light: #ffb3c6;
            --happy: #67c28e;
            --sad: #ff6b6b;
            --unlock-color: #ffd700;
            --border: #eeeeee;
            --border-dashed: #f0f0f0;
            --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-btn: 0 4px 12px rgba(255, 143, 171, 0.3);
            --focus-shadow: 0 0 0 4px rgba(255, 143, 171, 0.1);
            --empty-text: #cccccc;
            --filter-bg: rgba(255, 143, 171, 0.05);
            --select-bg: var(--card-bg);
            --success: #67c28e;
        }
        :root.dark-mode {
            --bg-main: linear-gradient(135deg, #1f2125 0%, #121417 100%);
            --card-bg: #27292d;
            --text-main: #f5f5f5;
            --text-secondary: #c0c4cc;
            --text-light: #909399;
            --primary: #ff9eb5;
            --primary-light: #ffc1d1;
            --happy: #72d392;
            --sad: #ff7a7a;
            --unlock-color: #ffd700;
            --border: #38393d;
            --border-dashed: #303134;
            --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.2);
            --shadow-btn: 0 4px 12px rgba(255, 143, 171, 0.2);
            --focus-shadow: 0 0 0 4px rgba(255, 143, 171, 0.2);
            --empty-text: #444649;
            --filter-bg: rgba(255, 143, 171, 0.1);
            --select-bg: var(--card-bg);
            --success: #72d392;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        body {
            background: var(--bg-main);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav-btn {
            padding: 10px 16px;
            border-radius: 12px;
            border: none;
            background: var(--card-bg);
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .nav-btn:hover {
            transform: translateY(-2px);
        }
        .unlock-jump-btn {
            background: linear-gradient(135deg, var(--unlock-color), #ffc107);
            color: white;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.15); }
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
        }
        .title {
            text-align: center;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            margin-bottom: 8px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background: transparent;
            color: var(--text-main);
        }
        .status-radio {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }
        .status-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--border);
            cursor: pointer;
        }
        .status-item.happy.checked {
            border-color: var(--happy);
            background: rgba(103, 194, 142, 0.1);
            color: var(--happy);
        }
        .status-item.sad.checked {
            border-color: var(--sad);
            background: rgba(255, 107, 107, 0.1);
            color: var(--sad);
        }
        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        .jump-unlock-btn {
            width: 100%;
            padding: 12px;
            background: var(--unlock-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }
        .stat {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 12px;
        }
        .filter-box {
            background: var(--filter-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .filter-group {
            flex: 1;
            min-width: 140px;
        }
        .filter-label {
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
        }
        .filter-input, .filter-select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .filter-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
        }
        .reset-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: var(--text-secondary);
            color: white;
        }
        .record-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .record-date {
            color: var(--primary);
            font-weight: bold;
        }
        .del-btn {
            margin-top: 10px;
            padding: 6px 10px;
            background: var(--sad);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
        }
        .empty-record {
            text-align: center;
            padding: 40px 0;
            color: var(--empty-text);
        }
        .unlock-mask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 999; opacity: 0; pointer-events: none;
        }
        .unlock-mask.show {
            opacity: 1; pointer-events: all;
        }
        .unlock-popup {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 20px;
            border: 3px solid var(--unlock-color);
            width: 90%; max-width: 400px;
            text-align: center;
        }
        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <button class="nav-btn" id="modeSwitch">🌙 夜间模式</button>
        <button class="nav-btn" onclick="location.href='analysis.html'">📊 分析</button>
        <button class="nav-btn unlock-jump-btn" onclick="location.href='unlocked.html'">🎉 解锁</button>
        <button class="nav-btn" onclick="showSavedRecipes()">❤️ 收藏</button>
    </div>

    <div class="card">
        <h2 class="title">🍼 辅食记录</h2>
        <p class="subtitle">记录喂养，解锁辅食，AI推荐食谱</p>
        <form id="foodForm">
            <div class="form-group">
                <label>📅 日期</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>⏰ 时间</label>
                <input type="time" id="time" required>
            </div>
            <div class="form-group">
                <label>🥣 辅食</label>
                <input type="text" id="food" placeholder="例：南瓜泥" required>
            </div>
            <div class="form-group">
                <label>🍽️ 份量</label>
                <input type="text" id="amount" placeholder="例：50g" required>
            </div>
            <div class="form-group">
                <label>📝 反馈</label>
                <textarea id="feedback"></textarea>
                <div class="status-radio">
                    <div class="status-item happy" data-type="happy" onclick="selectStatus(this)">😊 状态佳</div>
                    <div class="status-item sad" data-type="sad" onclick="selectStatus(this)">😢 一般</div>
                </div>
            </div>
            <button class="save-btn" type="submit">💾 保存记录</button>
            <div class="stat" id="stat">共 0 条记录</div>
        </form>
    </div>

    <div class="card" id="recommend">
        <h2 class="title">🤖 AI辅食推荐</h2>
        <p class="subtitle">按分类推荐，可分享可收藏</p>
        <div class="form-group">
            <label>👶 宝宝年龄</label>
            <input type="text" id="babyAge" value="10个月">
        </div>
        <div class="form-group">
            <label>🍽️ 分类推荐</label>
            <select id="foodCategory"></select>
        </div>
        <button class="save-btn" onclick="getAIRecommendation()">📚 获取推荐</button>
        <div id="recommendResult" style="margin-top:20px; padding:16px; background:var(--filter-bg); border-radius:12px; display:none;">
            <h3 id="recommendTitle"></h3>
            <div id="recommendContent" style="line-height:1.8;"></div>
            <div style="display:flex; gap:10px; margin-top:12px;">
                <button class="btn" style="flex:1; background:var(--success);" onclick="saveRecommend()">❤️ 收藏</button>
                <button class="btn" style="flex:1; background:#4285f4;" onclick="shareRecipe()">📤 分享</button>
            </div>
        </div>
    </div>

    <div class="filter-box">
        <div class="filter-row">
            <div class="filter-group">
                <label class="filter-label">辅食名称</label>
                <input class="filter-input" id="filterFood">
            </div>
            <div class="filter-group">
                <label class="filter-label">状态</label>
                <select class="filter-select" id="filterStatus">
                    <option value="">全部</option>
                    <option value="happy">😊 佳</option>
                    <option value="sad">😢 一般</option>
                </select>
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-group">
                <label class="filter-label">开始日期</label>
                <input type="date" class="filter-input" id="filterStartDate">
            </div>
            <div class="filter-group">
                <label class="filter-label">结束日期</label>
                <input type="date" class="filter-input" id="filterEndDate">
            </div>
        </div>
        <div class="filter-actions">
            <button class="filter-btn" onclick="filterRecords()">筛选</button>
            <button class="reset-btn" onclick="resetFilter()">重置</button>
        </div>
    </div>

    <div class="record-list" id="recordList">
        <div class="empty-record">暂无记录</div>
    </div>
</div>

<div class="unlock-mask" id="shareMask">
    <div class="unlock-popup">
        <h3>📤 分享食谱</h3>
        <textarea id="recipeText" style="height:120px; margin:15px 0;" readonly></textarea>
        <button class="btn" style="background:#4285f4;" onclick="copyRecipeText()">📋 复制文本</button>
        <button class="btn" style="background:var(--primary); margin-left:8px;" onclick="document.getElementById('shareMask').classList.remove('show')">关闭</button>
    </div>
</div>

<div class="unlock-mask" id="savedRecipesMask">
    <div class="unlock-popup" style="max-width:500px;">
        <h3>❤️ 我的收藏</h3>
        <div id="savedRecipesList" style="text-align:left; max-height:400px; overflow-y:auto;"></div>
        <button class="btn" style="background:var(--primary); margin-top:15px;" onclick="document.getElementById('savedRecipesMask').classList.remove('show')">关闭</button>
    </div>
</div>

<script src="config.js"></script>
<script>
const STORAGE_KEY = 'babyFoodRecords';
const MODE_KEY = 'babyFoodRecordMode';
const UNLOCK_KEY = 'unlockedFoods';
const STATUS_COUNT_KEY = 'foodStatusCount';
let babyStatus = '';

window.onload = function() {
    const m = localStorage.getItem(MODE_KEY)||'light-mode';
    document.documentElement.className = m;
    document.getElementById('modeSwitch').innerText = m=='light-mode'?'🌙 夜间':'☀️ 日间';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    renderAllRecords();
    updateStat();
    const sel = document.getElementById('foodCategory');
    FOOD_CATEGORIES.forEach(c=>{
        const o = document.createElement('option');
        o.value=c; o.innerText=c; sel.appendChild(o);
    });
};

document.getElementById('modeSwitch').onclick=()=>{
    const root=document.documentElement;
    const now=root.className;
    const next=now=='light-mode'?'dark-mode':'light-mode';
    root.className=next;
    localStorage.setItem(MODE_KEY,next);
    document.getElementById('modeSwitch').innerText=next=='light-mode'?'🌙 夜间':'☀️ 日间';
};

function selectStatus(el){
    document.querySelectorAll('.status-item').forEach(i=>i.classList.remove('checked'));
    el.classList.add('checked');
    babyStatus=el.dataset.type;
}

function getRecords(){return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}
function setRecords(arr){localStorage.setItem(STORAGE_KEY,JSON.stringify(arr))}
function getUnlocked(){return JSON.parse(localStorage.getItem(UNLOCK_KEY))||[]}
function setUnlocked(arr){localStorage.setItem(UNLOCK_KEY,JSON.stringify(arr))}
function getStatusCount(){return JSON.parse(localStorage.getItem(STATUS_COUNT_KEY))||{}}
function setStatusCount(o){localStorage.setItem(STATUS_COUNT_KEY,JSON.stringify(o))}

document.getElementById('foodForm').onsubmit=e=>{
    e.preventDefault();
    if(!babyStatus){alert('请选状态');return}
    const r={
        date:document.getElementById('date').value,
        time:document.getElementById('time').value,
        food:document.getElementById('food').value.trim(),
        amount:document.getElementById('amount').value,
        feedback:document.getElementById('feedback').value.trim(),
        babyStatus:babyStatus
    };
    const arr=getRecords();
    arr.unshift(r);
    setRecords(arr);
    updateStat();
    renderAllRecords();
    checkUnlock(r.food);
    e.target.reset();
    babyStatus='';
    document.querySelectorAll('.status-item').forEach(i=>i.classList.remove('checked'));
};

function checkUnlock(food){
    const cnt=getStatusCount();
    const v=cnt[food]||0;
    if(babyStatus=='happy') cnt[food]=v+1;
    else cnt[food]=0;
    setStatusCount(cnt);
    if(cnt[food]==3){
        const ul=getUnlocked();
        if(!ul.includes(food)){ul.push(food);setUnlocked(ul)}
        cnt[food]=0;
        setStatusCount(cnt);
    }
}

function updateStat(){
    const t=getRecords().length;
    const u=getUnlocked().length;
    document.getElementById('stat').innerText=`共 ${t} 条 | 已解锁 ${u} 种`;
}

function renderAllRecords(){
    renderRecords(getRecords(),'全部');
}

function filterRecords(){
    const kw=document.getElementById('filterFood').value.toLowerCase();
    const st=document.getElementById('filterStatus').value;
    const sdt=document.getElementById('filterStartDate').value;
    const edt=document.getElementById('filterEndDate').value;
    let arr=getRecords().filter(i=>{
        const m1=kw?i.food.toLowerCase().includes(kw):true;
        const m2=st?i.babyStatus==st:true;
        const m3=sdt?i.date>=sdt:true;
        const m4=edt?i.date<=edt:true;
        return m1&&m2&&m3&&m4;
    });
    renderRecords(arr,'已筛选');
}

function resetFilter(){
    document.getElementById('filterFood').value='';
    document.getElementById('filterStatus').value='';
    document.getElementById('filterStartDate').value='';
    document.getElementById('filterEndDate').value='';
    renderAllRecords();
}

function renderRecords(arr,msg){
    const list=document.getElementById('recordList');
    if(arr.length===0){list.innerHTML='<div class="empty-record">无记录</div>';return}
    arr.sort((a,b)=>new Date(b.date+b.time)-new Date(a.date+a.time));
    list.innerHTML=arr.map((i,idx)=>`
    <div class="record-item">
        <div class="record-date">${i.date} ${i.time}</div>
        <div><strong>${i.food}</strong></div>
        <div>份量：${i.amount}</div>
        <div>反馈：${i.feedback||'无'}</div>
        <div>状态：${i.babyStatus=='happy'?'😊 佳':'😢 一般'}</div>
        <button class="del-btn" onclick="del(${idx})">删除</button>
    </div>`).join('');
}

function del(idx){
    if(!confirm('确定删除？'))return;
    const a=getRecords();
    a.splice(idx,1);
    setRecords(a);
    updateStat();
    renderAllRecords();
}

let recommendHistory=JSON.parse(localStorage.getItem('recommendHistory'))||[];
async function getAIRecommendation(){
    const age=document.getElementById('babyAge').value||'10个月';
    const cat=document.getElementById('foodCategory').value;
    const unlocked=getUnlocked();
    const all=getRecords();
    const love=all.filter(i=>i.babyStatus=='happy').map(i=>i.food);
    const resBox=document.getElementById('recommendResult');
    const title=document.getElementById('recommendTitle');
    const content=document.getElementById('recommendContent');
    resBox.style.display='block';
    title.innerText='加载中...';
    content.innerText='AI正在生成食谱...';
    try{
        const prompt=getRecommendPrompt(unlocked,love,cat,age);
        const resp=await fetch(AI_CONFIG.apiUrl,{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':`Bearer ${AI_CONFIG.apiKey}`},
            body:JSON.stringify({model:AI_CONFIG.model,messages:[{role:'user',content:prompt}],temperature:0.7})
        });
        const j=await resp.json();
        const txt=j.choices[0].message.content.trim();
        title.innerText=txt.split('\n')[0];
        content.innerText=txt;
        recommendHistory.unshift({date:new Date().toISOString().split('T')[0],title:title.innerText,content:txt,cat:cat,age:age});
        localStorage.setItem('recommendHistory',JSON.stringify(recommendHistory));
    }catch(e){
        title.innerText='获取失败';
        content.innerText='请检查API配置或网络';
    }
}

function shareRecipe(){
    const t=document.getElementById('recommendTitle').innerText;
    const c=document.getElementById('recommendContent').innerText;
    const s=`【宝宝辅食】${t}\n\n${c}\n\n来自宝宝辅食记录工具`;
    document.getElementById('recipeText').value=s;
    document.getElementById('shareMask').classList.add('show');
}

function copyRecipeText(){
    document.getElementById('recipeText').select();
    document.execCommand('copy');
    alert('复制成功，可粘贴分享');
}

function saveRecommend(){
    const t=document.getElementById('recommendTitle').innerText;
    const c=document.getElementById('recommendContent').innerText;
    let fav=JSON.parse(localStorage.getItem('savedRecipes'))||[];
    if(!fav.some(x=>x.title==t)){
        fav.push({date:new Date().toISOString().split('T')[0],title:t,content:c});
        localStorage.setItem('savedRecipes',JSON.stringify(fav));
        alert('已收藏');
    }else{alert('已收藏过')}
}

function showSavedRecipes(){
    const fav=JSON.parse(localStorage.getItem('savedRecipes'))||[];
    const box=document.getElementById('savedRecipesList');
    if(fav.length===0){box.innerHTML='<p style="text-align:center">暂无收藏</p>'}
    else{
        box.innerHTML=fav.map((it,i)=>`
        <div style="padding:10px; border-bottom:1px solid var(--border);">
            <h4>${i+1}. ${it.title}</h4>
            <p style="font-size:14px; line-height:1.5">${it.content}</p>
        </div>`).join('');
    }
    document.getElementById('savedRecipesMask').classList.add('show');
}
</script>
</body>
</html>
