<!DOCTYPE html>
<html lang="zh-CN" class="light-mode">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝宝辅食成长记录</title>
<style>
:root.light-mode{--bg-main:linear-gradient(135deg,#fdfbfb 0%,#ebedee 100%);--card-bg:#fff;--text-main:#444;--text-secondary:#888;--primary:#ff8fab;--happy:#67c28e;--sad:#ff6b6b;--unlock:#ffd700;--border:#eee;--table-header:#f9fafc}
:root.dark-mode{--bg-main:linear-gradient(135deg,#1f2125 0%,#121417 100%);--card-bg:#27292d;--text-main:#f5f5f5;--text-secondary:#c0c4cc;--primary:#ff9eb5;--happy:#72d392;--sad:#ff7a7a;--unlock:#ffd700;--border:#38393d;--table-header:#333}
*{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC,Microsoft YaHei,sans-serif}
body{background:var(--bg-main);padding:20px}
.container{max-width:600px;margin:0 auto}
.nav-bar{display:flex;justify-content:space-between;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.nav-btn{padding:10px 14px;border-radius:12px;border:none;background:var(--card-bg);color:var(--primary);cursor:pointer}
.card{background:var(--card-bg);border-radius:20px;padding:24px;margin-bottom:20px}
.title{text-align:center;color:var(--primary);font-size:24px;margin-bottom:8px}
.subtitle{text-align:center;color:var(--text-secondary);margin-bottom:20px}
.form-group{margin-bottom:16px}
label{display:block;margin-bottom:6px;color:var(--text-secondary)}
input,textarea,select{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text-main)}
.status-radio{display:flex;gap:10px;margin-top:8px}
.status-item{flex:1;padding:10px;text-align:center;border:2px solid var(--border);border-radius:10px;cursor:pointer}
.status-item.checked{border-color:var(--primary);background:rgba(255,143,171,.1)}
.save-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:14px;font-weight:bold;margin-top:10px;cursor:pointer}
.record-item{padding:16px;border-radius:16px;background:var(--card-bg);border:1px solid var(--border);margin-bottom:12px}
.del-btn{margin-top:8px;padding:6px 10px;background:var(--sad);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:40px;color:var(--text-secondary)}
#recommendResult{margin-top:20px;padding:20px;border-radius:12px;background:rgba(255,143,171,.05);line-height:1.8}
.share-btn{background:#4285f4;color:#fff;border:none;padding:10px;border-radius:8px;margin-top:10px;width:100%;cursor:pointer}
.collect-btn{background:var(--happy);color:#fff;border:none;padding:10px;border-radius:8px;margin-top:10px;width:100%;cursor:pointer}
.filter-box{padding:16px;border-radius:12px;background:rgba(255,143,171,.05);margin-bottom:20px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.filter-group{flex:1;min-width:120px}
.filter-btn{padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="nav-bar">
    <button class="nav-btn" id="modeSwitch">🌙 夜间模式</button>
    <button class="nav-btn" onclick="location.href='analysis.html'">📊 分析</button>
    <button class="nav-btn" onclick="location.href='unlocked.html'">🎉 解锁</button>
  </div>

  <div class="card">
    <h2 class="title">🍼 辅食记录</h2>
    <p class="subtitle">记录每一天的成长</p>
    <form id="foodForm">
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="date" required>
      </div>
      <div class="form-group">
        <label>辅食名称</label>
        <input type="text" id="food" placeholder="例：南瓜泥" required>
      </div>
      <div class="form-group">
        <label>份量</label>
        <input type="text" id="amount" placeholder="例：50g">
      </div>
      <div class="form-group">
        <label>宝宝状态</label>
        <div class="status-radio">
          <div class="status-item" data-status="happy" onclick="setSt(this)">😊 爱吃</div>
          <div class="status-item" data-status="sad" onclick="setSt(this)">😢 一般</div>
        </div>
      </div>
      <button class="save-btn" type="submit">保存记录</button>
    </form>
  </div>

  <div class="card">
    <h2 class="title">🤖 AI辅食推荐（含视频）</h2>
    <p class="subtitle">按分类推荐，自动配做法视频</p>
    <div class="form-group">
      <label>宝宝月龄</label>
      <input type="text" id="age" value="8个月">
    </div>
    <div class="form-group">
      <label>辅食分类</label>
      <select id="cate"></select>
    </div>
    <button class="save-btn" onclick="getAI()">获取推荐+视频</button>
    <div id="recommendResult" style="white-space:pre-wrap"></div>
    <button class="share-btn" onclick="share()">📤 复制分享食谱</button>
    <button class="collect-btn" onclick="collect()">❤️ 收藏食谱</button>
  </div>

  <div class="filter-box">
    <div class="filter-row">
      <div class="filter-group">
        <label>辅食</label>
        <input id="fFood">
      </div>
      <div class="filter-group">
        <label>状态</label>
        <select id="fStatus">
          <option value="">全部</option>
          <option value="happy">爱吃</option>
          <option value="sad">一般</option>
        </select>
      </div>
    </div>
    <button class="filter-btn" onclick="filter()">筛选</button>
  </div>

  <div id="list"></div>
</div>

<script src="config.js"></script>
<script>
const STORAGE = "babyFoodRecords";
const UNLOCK = "unlockedFoods";
const MODE = "mode";
let status = "";

window.onload = ()=>{
  const m = localStorage.getItem(MODE)||"light-mode";
  document.documentElement.className = m;
  modeSwitch.innerText = m=="light-mode"?"🌙 夜间":"☀️ 日间";
  date.value = new Date().toISOString().split("T")[0];
  renderList();
  cateSelect();
};

modeSwitch.onclick = ()=>{
  const now = document.documentElement.className;
  const next = now=="light-mode"?"dark-mode":"light-mode";
  document.documentElement.className = next;
  localStorage.setItem(MODE,next);
  modeSwitch.innerText = next=="light-mode"?"🌙 夜间":"☀️ 日间";
};

function cateSelect(){
  const s = document.getElementById("cate");
  FOOD_CATEGORIES.forEach(c=>{
    const o = document.createElement("option");
    o.value=c; o.innerText=c; s.appendChild(o);
  });
}

function setSt(el){
  document.querySelectorAll(".status-item").forEach(i=>i.classList.remove("checked"));
  el.classList.add("checked");
  status = el.dataset.status;
}

foodForm.onsubmit = e=>{
  e.preventDefault();
  if(!status){alert("请选状态");return}
  const item = {
    date:date.value,
    food:food.value,
    amount:amount.value,
    status:status
  };
  const arr = JSON.parse(localStorage.getItem(STORAGE))||[];
  arr.unshift(item);
  localStorage.setItem(STORAGE,JSON.stringify(arr));
  foodForm.reset();
  status = "";
  document.querySelectorAll(".status-item").forEach(i=>i.classList.remove("checked"));
  renderList();
  checkUnlock(item.food);
};

function checkUnlock(food){
  const ul = JSON.parse(localStorage.getItem(UNLOCK))||[];
  if(!ul.includes(food)){
    ul.push(food);
    localStorage.setItem(UNLOCK,JSON.stringify(ul));
  }
}

function renderList(){
  const arr = JSON.parse(localStorage.getItem(STORAGE))||[];
  const box = document.getElementById("list");
  if(arr.length===0){box.innerHTML='<div class="empty">暂无记录</div>';return}
  box.innerHTML = arr.map((i,idx)=>`
  <div class="record-item">
    <div>${i.date} | ${i.food}</div>
    <div>份量：${i.amount||'-'}</div>
    <div>状态：${i.status=='happy'?'😊 爱吃':'😢 一般'}</div>
    <button class="del-btn" onclick="del(${idx})">删除</button>
  </div>
  `).join("");
}

function del(idx){
  const a = JSON.parse(localStorage.getItem(STORAGE))||[];
  a.splice(idx,1);
  localStorage.setItem(STORAGE,JSON.stringify(a));
  renderList();
}

function filter(){
  const kw = fFood.value.toLowerCase();
  const st = fStatus.value;
  const a = JSON.parse(localStorage.getItem(STORAGE))||[];
  const res = a.filter(i=>{
    const m1 = kw?i.food.toLowerCase().includes(kw):true;
    const m2 = st?i.status==st:true;
    return m1&&m2;
  });
  const box = document.getElementById("list");
  box.innerHTML = res.length?res.map((i,idx)=>`
  <div class="record-item">
    <div>${i.date} | ${i.food}</div>
    <div>份量：${i.amount||'-'}</div>
    <div>状态：${i.status=='happy'?'😊 爱吃':'😢 一般'}</div>
    <button class="del-btn" onclick="del(${idx})">删除</button>
  </div>
  `).join(""):'<div class="empty">无结果</div>';
}

async function getAI(){
  const age = document.getElementById("age").value;
  const cate = document.getElementById("cate").value;
  const box = document.getElementById("recommendResult");
  box.innerText = "正在生成辅食+视频推荐...";
  try{
    const r = await fetch(AI_CONFIG.apiUrl,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${AI_CONFIG.apiKey}`},
      body:JSON.stringify({
        model:AI_CONFIG.model,
        messages:[{role:"user",content:getPrompt(age,cate)}]
      })
    });
    const d = await r.json();
    box.innerText = d.choices[0].message.content;
  }catch(e){
    box.innerText = "推荐失败，请检查API";
  }
}

function share(){
  const t = document.getElementById("recommendResult").innerText;
  if(!t||t.includes("失败")||t.includes("生成中")){alert("暂无内容可分享");return}
  navigator.clipboard.writeText("【宝宝辅食推荐】\n"+t).then(()=>{
    alert("已复制，可粘贴到微信/抖音");
  });
}

function collect(){
  const t = document.getElementById("recommendResult").innerText;
  if(!t||t.includes("失败")||t.includes("生成中")){alert("暂无内容可收藏");return}
  const fav = JSON.parse(localStorage.getItem("collect"))||[];
  fav.push({time:new Date().toLocaleString(),text:t});
  localStorage.setItem("collect",JSON.stringify(fav));
  alert("收藏成功");
}
</script>
</body>
</html>
